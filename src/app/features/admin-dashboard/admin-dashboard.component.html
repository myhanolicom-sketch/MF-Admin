<div class="dashboard">
  <div class="card">
    <form [formGroup]="filterForm" class="filters-form">
      
      <div class="filter-row-fechas-inline">
        <div class="fecha-inline-item">
          <label>Desde:</label>
          <p-datepicker formControlName="fechaDesde" [showIcon]="true" iconDisplay="input" placeholder="dd/mm/aaaa" appendTo="body"></p-datepicker>
        </div>

        <div class="fecha-inline-item">
          <label>Hasta:</label>
          <p-datepicker formControlName="fechaHasta" [showIcon]="true" iconDisplay="input" placeholder="dd/mm/aaaa" appendTo="body"></p-datepicker>
        </div>

        <div class="filters-side-by-side">
          <div class="filter-section">
            <span class="section-title">Estado</span>
            <div formArrayName="estados" class="checkbox-group">
              <div class="checkbox-item" *ngFor="let e of estadosList; let i = index">
                <p-checkbox [formControlName]="i" [binary]="true"></p-checkbox>
                <label>{{ e.label }}</label>
              </div>
            </div>
          </div>

          <div class="filter-section">
            <span class="section-title">Archivos</span>
            <div formArrayName="archivos" class="checkbox-group">
              <div class="checkbox-item" *ngFor="let a of archivosList; let i = index">
                <p-checkbox [formControlName]="i" [binary]="true"></p-checkbox>
                <label>{{ a }}</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="filter-actions">
        <button pButton type="button" label="Buscar" icon="pi pi-search" class="p-button-primary" (click)="onSearch()" [loading]="isLoading()"></button>
        <button pButton type="button" label="Limpiar" icon="pi pi-times" class="p-button-secondary" (click)="onClear()"></button>
      </div>
    </form>

    <p-table 
      [value]="filteredData()" 
      [paginator]="true" 
      [rows]="5" 
      [rowsPerPageOptions]="[5, 10, 20]"
      [tableStyle]="{ 'min-width': '50rem' }"
      responsiveLayout="scroll"
      styleClass="p-datatable-sm p-datatable-striped">
      
      <ng-template #caption>
        <div class="table-header">
          <span class="text-xl font-bold"> </span>
          <button pButton type="button" icon="pi pi-file-excel" class="p-button-success p-button-rounded" (click)="exportToExcel()"></button>
        </div>
      </ng-template>

      <ng-template #header>
        <tr>
          <th pSortableColumn="fechaHora">Fecha/Hora <p-sortIcon field="fechaHora"></p-sortIcon></th>
          <th pSortableColumn="archivo">Archivo <p-sortIcon field="archivo"></p-sortIcon></th>
          <th pSortableColumn="estado">Estado <p-sortIcon field="estado"></p-sortIcon></th>
          <th>Acciones</th>
        </tr>
      </ng-template>

      <ng-template #body let-report>
        <tr>
          <td>{{ report.fechaHora }}</td>
          <td><span class="font-bold">{{ report.archivo }}</span></td>
          <td>
            <div class="estado-cell">
              <span class="traffic-light" [ngClass]="'traffic-' + report.estado"></span>
              <p-tag [value]="getEstadoLabel(report.estado)" severity="secondary"></p-tag>
            </div>
          </td>
          <td>
            <div class="acciones-cell">
              <button pButton type="button" icon="pi pi-eye" class="p-button-text p-button-rounded" pTooltip="Ver detalle" tooltipPosition="top" (click)="showDetailModal(report)"></button>
              <button *ngIf="report.estado === 'errorEnviar'" pButton type="button" icon="pi pi-send" class="p-button-text p-button-rounded p-button-help" pTooltip="Reenviar" tooltipPosition="top"></button>
              <button *ngIf="report.estado === 'errorGenerar'" pButton type="button" icon="pi pi-refresh" class="p-button-text p-button-rounded" pTooltip="Regenerar" tooltipPosition="top"></button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
