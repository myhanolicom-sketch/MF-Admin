<div class="dashboard">

  <form [formGroup]="filterForm" class="filters-form">

    

<!-- FECHAS -->
    <div class="filter-row-fechas-inline">
      <div class="fecha-inline-item">
        <label>Fecha:</label>
           <p-datepicker
            id="fechaDesde"
            formControlName="fechaDesde"
            [showIcon]="true"
            placeholder="Desde"
            styleClass="w-full datepicker-input"
            panelStyleClass="datepicker-panel"
            appendTo="body">
          </p-datepicker>
      </div>

      <div class="fecha-inline-item">
        <label>---</label>
        <p-datepicker
            id="fechaHasta"
            formControlName="fechaHasta"
            [showIcon]="true"
            placeholder="Hasta"
            styleClass="w-full datepicker-input"
            panelStyleClass="datepicker-panel"
            appendTo="body">
          </p-datepicker>
      </div>

        <div class="filters-side-by-side">
 <!-- ARCHIVOS -->
    <div class="filter-section filter-estados">
      <span class="section-title">Estado</span>
      <div formArrayName="estados" class="checkbox-group">
         <div class="checkbox-item" *ngFor="let e of estadosList; let i = index">
          <p-checkbox [formControlName]="i" binary="true"></p-checkbox>
          <label>{{ e.label }}</label>
        </div>
        
      </div>
    </div>

    </div>

    <!-- ESTADOS -->
    <div class="filter-section filter-archivos">
      <span>Archivos</span>
      <div formArrayName="archivos" class="checkbox-group">
       <div class="checkbox-item" *ngFor="let a of archivosList; let i = index">
          <p-checkbox [formControlName]="i" binary="true"></p-checkbox>
          <label>{{ a }}</label>
        </div>
      </div>
    </div>

        </div>

  
    

   

    <!-- BOTONES -->
    <div class="mb-4 flex gap-2 filter-actions">
    <button 
      pButton 
      type="button" 
      label="Buscar" 
      icon="pi pi-search" 
      class="p-button-primary"
      >
    </button>
    <button 
      pButton 
      type="button" 
      label="Limpiar" 
      icon="pi pi-times" 
      class="p-button-secondary"
      (click)="onClear()">
    </button>
   
  </div>

  </form>

  
<!-- TABLA -->
<p-table [value]="filteredData()" [paginator]="true" [rows]="10" [responsiveLayout]="'scroll'" [showCurrentPageReport]="true" currentPageReportTemplate="Mostrando {first} - {last} de {totalRecords}">
   <ng-template pTemplate="caption">
    <div class="table-header">
      <button 
        pButton 
        type="button" 
        icon="pi pi-file-excel" 
         class="p-button-success excel-btn"
        (click)="exportToExcel()">
      </button>
    </div>
  </ng-template>
  <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="fechaHora">Fecha/Hora <p-sortIcon field="fechaHora"></p-sortIcon></th>
        <th pSortableColumn="archivo">Archivo <p-sortIcon field="archivo"></p-sortIcon></th>
        <th pSortableColumn="estado">Estado <p-sortIcon field="estado"></p-sortIcon></th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-report>
      <tr>
        <td>{{ report.fechaHora }}</td>
        <td>{{ report.archivo }}</td>
        <td>{{ report.estado }}</td>
        <td>
          <button pButton type="button" icon="pi pi-eye" class="p-button-sm p-button-info" ></button>
          <button pButton type="button"  icon="pi pi-send" class="p-button-sm p-button-success" ></button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center">No hay datos para mostrar</td>
      </tr>
    </ng-template>
  </p-table>
</div>
